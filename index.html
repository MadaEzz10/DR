<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدكتور - شرح المواد الطبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(126, 34, 206, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(30, 60, 114, 0.3) 0%, transparent 50%);
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #333;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        /* Hero Section */
        .hero {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            align-items: center;
        }

        .logo-section {
            text-align: center;
        }

        .logo-section img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border: 5px solid #fff;
            object-fit: cover;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .logo-section h3 {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
            line-height: 1.6;
        }

        /* Owner Section */
        .owner-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2.5rem;
            border-radius: 50%;
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .owner-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .owner-section img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1rem;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        .owner-section h3 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
            position: relative;
            z-index: 1;
        }

        .owner-section p {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .contact-btn {
            display: inline-block;
            padding: 10px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Universities Section */
        .universities {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .uni-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .uni-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .uni-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .uni-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1rem;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .uni-card h4 {
            font-size: 1.3rem;
            color: #333;
            font-weight: 700;
        }

        /* Services Section */
        .services {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .slider-wrapper {
            position: relative;
            overflow: visible;
            padding: 3rem 0;
        }

        .slider {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .slider-item {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .slider-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        .slider-item:hover {
            transform: translateY(-15px) scale(1.1);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }

        .slider-item img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 0.8rem;
            object-fit: cover;
            border: 3px solid white;
            position: relative;
            z-index: 1;
        }

        .slider-item h4 {
            font-size: 1rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
            padding: 0 1rem;
            line-height: 1.3;
        }

        .arrow {
            display: none;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }

            .logo-section h1 {
                font-size: 2rem;
            }

            .logo-section h3 {
                font-size: 1rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .uni-grid {
                grid-template-columns: 1fr;
            }

            .slider {
                gap: 1.5rem;
            }

            .slider-item {
                width: 180px;
                height: 180px;
            }

            .slider-item img {
                width: 70px;
                height: 70px;
            }

            .slider-item h4 {
                font-size: 0.9rem;
            }

            .arrow {
                display: none;
            }

            .hero-card {
                padding: 2rem 1.5rem;
            }

            .slider-wrapper {
                padding: 2rem 1.5rem;
            }

            .owner-section {
                width: 300px;
                height: 300px;
                padding: 2rem;
            }

            .owner-section img {
                width: 100px;
                height: 100px;
            }

            .owner-section h3 {
                font-size: 1.3rem;
            }

            .owner-section p {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .navbar h1 {
                font-size: 1.5rem;
            }

            .logo-section img {
                width: 120px;
                height: 120px;
            }

            .logo-section h1 {
                font-size: 1.7rem;
            }

            .owner-section {
                width: 280px;
                height: 280px;
            }

            .owner-section img {
                width: 90px;
                height: 90px;
            }

            .slider-item {
                width: 160px;
                height: 160px;
            }

            .slider-item img {
                width: 60px;
                height: 60px;
            }

            .slider-item h4 {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-content">
            <h1>🎓 الدكتور</h1>
            <ul class="nav-links">
                <li><a href="#home">الرئيسية</a></li>
                <li><a href="#services">الخدمات</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-card">
            <div class="hero-content">
                <div class="logo-section">
                    <img src="images/logo-placeholder.png" alt="شعار المنصة" onerror="this.src='https://via.placeholder.com/180'">
                    <h1>الدكتور للخدمات التعليمية</h1>
                </div>
                <div class="owner-section" id="contact">
                    <img src="images/DR.jpeg" alt="صورة الدكتور طه" onerror="this.src='https://via.placeholder.com/150'">
                    <h3>DR Taha</h3>
                    <p>📱 WhatsApp: +20 109 945 2639</p>
                    <a href="https://wa.me/201099452639" class="contact-btn" target="_blank">تواصل عبر واتساب</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Universities Section -->
<section class="universities">
    <h2 class="section-title">🏛️ الجامعات المتاحة</h2>
    <div class="uni-grid">
        <div class="uni-card">
            <img src="images/qatar.png" alt="جامعة قطر" onerror="this.src='https://via.placeholder.com/80'">
            <h4>جامعة قطر</h4>
        </div>
        <div class="uni-card">
            <img src="images/wasel.jpeg" alt="جامعة لوسيل" onerror="this.src='https://via.placeholder.com/80'">
            <h4>جامعة لوسيل</h4>
        </div>
        <div class="uni-card">
            <img src="images/bn7md.jpg" alt="جامعة بن حمد" onerror="this.src='https://via.placeholder.com/80'">
            <h4>جامعة بن حمد</h4>
        </div>
        <div class="uni-card">
            <img src="images/elmgtm3.png" alt="كلية المجتمع" onerror="this.src='https://via.placeholder.com/80'">
            <h4>كلية المجتمع بجامعة قطر</h4>
        </div>
        <div class="uni-card">
            <img src="images/qatar.png" alt="كلية الصحة" onerror="this.src='https://via.placeholder.com/80'">
            <h4>كلية الصحة والعلوم الحيوية</h4>
        </div>
        <div class="uni-card">
            <img src="images/qatar.png" alt="وايل كورنيل" onerror="this.src='https://via.placeholder.com/80'">
            <h4>وايل كورنيل الطب - قطر</h4>
        </div>
        <div class="uni-card">
            <img src="images/qatar.png" alt="كارنيجي ميلون" onerror="this.src='https://via.placeholder.com/80'">
            <h4>كارنيجي ميلون - قطر</h4>
        </div>
    </div>
</section>

    <!-- Services Section -->
    <section class="services" id="services">
        <h2 class="section-title">📚 خدماتنا</h2>
        <div class="slider-wrapper">
            <div class="slider" id="animated-slider"></div>
        </div>
    </section>

    <!-- في الصفحة الرئيسية index.html، غير الجزء ده: -->

    <script>
        const categories = [
            { image: 'images/medical.jpg', name: 'شرح المواد الطبيه basics', link: 'services.html?service=medical-basics' },
            { image: 'images/medical.jpg', name: 'شرح المواد الطبيه systems', link: 'services.html?service=medical-systems' },
            { image: 'images/business.jpeg', name: 'شرح المواد الأدبيه', link: 'services.html?service=literature' },
            { image: 'images/magester.jpg', name: 'رسائل ماجستير أبحاث التخرج', link: 'services.html?service=research' },
            { image: 'images/else.jpeg', name: 'خدمات أخرى', link: 'services.html?service=other' }
        ];

        function renderAnimatedSlider() {
            const slider = document.getElementById('animated-slider');
            slider.innerHTML = '';

            categories.forEach((item) => {
                const sliderItem = document.createElement('a');
                sliderItem.classList.add('slider-item');
                sliderItem.href = item.link || '#';
                sliderItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80'">
                    <h4>${item.name}</h4>
                `;
                slider.appendChild(sliderItem);
            });
        }

        renderAnimatedSlider();
    </script>
</body>

</html>
